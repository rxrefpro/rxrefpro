<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RxRef Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<title>RxRefPro</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>
 <script src="data.js"></script>

  <script src="app.js"></script>

</body>
<header>
  <h1>💊 RxRef Pro</h1>
  <p>Smart Clinical Learning Platform</p>
</header>

<nav>
  <button onclick="showTab('home')">Home</button>
  <button onclick="showTab('library')">Drugs</button>
  <button onclick="showTab('clinical')">Clinical</button>
  <button onclick="showTab('flash')">Flashcards</button>
  <button onclick="showTab('quiz')">Quiz</button>
  <button onclick="showTab('interactions')">Interactions</button>
  <button onclick="showTab('antidotes')">Antidotes</button>
</nav>

<section id="home" class="tab active">
  <h2 id="greeting"></h2>
  <div class="cards">
    <div class="card">💊 Drugs: 100+</div>
    <div class="card">🔥 Streak: 0</div>
    <div class="card">🎯 Accuracy: 0%</div>
  </div>
</section>

<section id="library" class="tab">
  <input id="search" placeholder="Search drugs..." onkeyup="renderDrugs()">
  <div id="drugList"></div>
</section>

<section id="clinical" class="tab">
  <h2>Clinical Cases</h2>
  <div id="caseBox"></div>
  <button onclick="nextCase()">Next Case</button>
</section>

<section id="flash" class="tab">
  <div id="flashcard" onclick="flipCard()">Tap to Start</div>
</section>

<section id="quiz" class="tab">
  <div id="question"></div>
  <div id="options"></div>
  <p id="explanation"></p>
</section>

<section id="interactions" class="tab">
  <input id="intInput" placeholder="Enter drugs (comma separated)">
  <button onclick="checkInteraction()">Check</button>
  <p id="intResult"></p>
</section>

<section id="antidotes" class="tab">
  <div id="antidoteList"></div>
</section>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
